name: Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: fileproxy_test
          POSTGRES_USER: fileproxy
          POSTGRES_PASSWORD: testpass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      FILEPROXY_VAULT_MASTER_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      DJANGO_SECRET_KEY: ci-test-only-not-used-in-production
      DEBUG: "true"
      DB_HOST: localhost
      DB_NAME: fileproxy_test
      DB_USER: fileproxy
      DB_PASSWORD: testpass

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        working-directory: fileproxy
        run: poetry install --without dev

      - name: Run tests
        working-directory: fileproxy
        run: poetry run python manage.py test accounts connections files usage subscription

  build-windows-client:
    name: Build Windows Client
    runs-on: windows-latest
    needs: build-and-deploy
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: windows-explorer/go.mod

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Build executables
        working-directory: windows-explorer
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          go build -ldflags="-H windowsgui" -o dist/fileproxy-explorer-amd64.exe .
          $env:GOARCH = "386"
          go build -ldflags="-H windowsgui" -o dist/fileproxy-explorer-386.exe .

      - name: Upload to S3
        run: |
          aws s3 cp windows-explorer/dist/fileproxy-explorer-amd64.exe s3://${{ secrets.S3_STATIC_BUCKET }}/static/dist/fileproxy-explorer-amd64.exe --cache-control "public, max-age=3600"
          aws s3 cp windows-explorer/dist/fileproxy-explorer-386.exe s3://${{ secrets.S3_STATIC_BUCKET }}/static/dist/fileproxy-explorer-386.exe --cache-control "public, max-age=3600"

  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: test
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: tag
        run: echo "IMAGE=${{ steps.ecr-login.outputs.registry }}/fileproxy:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        run: |
          docker build -t ${{ steps.tag.outputs.IMAGE }} .
          docker tag ${{ steps.tag.outputs.IMAGE }} ${{ steps.ecr-login.outputs.registry }}/fileproxy:latest
          docker push ${{ steps.tag.outputs.IMAGE }}
          docker push ${{ steps.ecr-login.outputs.registry }}/fileproxy:latest

      - name: Sync static files to S3
        run: |
          # Extract staticfiles from the built image
          CONTAINER=$(docker create ${{ steps.tag.outputs.IMAGE }})
          docker cp "$CONTAINER:/app/staticfiles/." ./staticfiles-out/
          docker rm "$CONTAINER"
          aws s3 sync ./staticfiles-out/ s3://${{ secrets.S3_STATIC_BUCKET }}/static/ \
            --cache-control "public, max-age=31536000, immutable" \
            --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CF_DISTRIBUTION_ID }} \
            --paths "/static/*"

      - name: Trigger ASG instance refresh
        run: |
          # Cancel any in-progress refresh so ours isn't blocked
          aws autoscaling cancel-instance-refresh \
            --auto-scaling-group-name fileproxy-prod-asg 2>/dev/null || true
          # Wait for cancellation to fully complete (cancel is async)
          for i in $(seq 1 60); do
            STATUS=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name fileproxy-prod-asg \
              --query 'InstanceRefreshes[0].Status' --output text 2>/dev/null || echo "None")
            echo "Refresh status: $STATUS"
            case "$STATUS" in
              Successful|Failed|Cancelled|RollbackSuccessful|RollbackFailed|None|None*)
                break ;;
            esac
            sleep 5
          done
          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name fileproxy-prod-asg \
            --preferences '{"MinHealthyPercentage": 100, "InstanceWarmup": 600}'
