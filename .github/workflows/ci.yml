name: CI

on:
  push:
    branches-ignore: [main]
  pull_request:

jobs:
  format:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: pip install ruff
      - run: npm --prefix fileproxy install
      - name: Format Python
        run: ruff format fileproxy/
      - name: Format TypeScript
        run: npm --prefix fileproxy run format
      - name: Commit formatting fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet || (git commit -am "style: auto-format [skip ci]" && git push)

  lint:
    runs-on: ubuntu-latest
    needs: [format]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install ruff
      - name: Lint (ruff check)
        run: ruff check fileproxy/
      - name: Format / isort (ruff format)
        run: ruff format --check fileproxy/

  test:
    runs-on: ubuntu-latest
    needs: [format]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install Poetry
        run: pip install poetry
      - name: Install dependencies
        working-directory: fileproxy
        run: poetry install --no-root
      - name: Generate test vault key
        run: |
          echo "FILEPROXY_VAULT_MASTER_KEY=$(python3 -c \
            'import os,base64; print(base64.urlsafe_b64encode(os.urandom(32)).decode())')" \
            >> "$GITHUB_ENV"
      - name: Run tests
        working-directory: fileproxy
        run: poetry run python manage.py test

  security:
    runs-on: ubuntu-latest
    needs: [format]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Bandit
        run: pip install bandit
      - name: Python security scan (Bandit)
        run: bandit -r fileproxy/ -x fileproxy/*/tests,fileproxy/*/migrations --severity-level medium -f txt
      - name: Install Node deps
        run: npm --prefix fileproxy install
      - name: TypeScript security scan (ESLint)
        run: npm --prefix fileproxy run lint:security
