name: CI

on:
  push:
    branches-ignore: [main]
  pull_request:

jobs:
  format:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: pip install ruff
      - run: npm --prefix fileproxy install
      - name: Format Python
        run: ruff format fileproxy/
      - name: Format TypeScript
        run: npm --prefix fileproxy run format
      - name: Commit formatting fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet || (git commit -am "style: auto-format" && git push)

  lint:
    runs-on: ubuntu-latest
    needs: [format]
    if: always() && needs.format.result != 'failure'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install ruff
      - name: Lint (ruff check)
        run: ruff check fileproxy/
      - name: Format / isort (ruff format)
        run: ruff format --check fileproxy/

  test:
    runs-on: ubuntu-latest
    needs: [format]
    if: always() && needs.format.result != 'failure'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install Poetry
        run: pip install poetry
      - name: Install dependencies
        working-directory: fileproxy
        run: poetry install --no-root
      - name: Generate test vault key
        run: |
          echo "FILEPROXY_VAULT_MASTER_KEY=$(python3 -c \
            'import os,base64; print(base64.urlsafe_b64encode(os.urandom(32)).decode())')" \
            >> "$GITHUB_ENV"
          echo "DEBUG=true" >> "$GITHUB_ENV"
      - name: Run tests
        working-directory: fileproxy
        run: poetry run python manage.py test

  go-test:
    runs-on: ubuntu-latest
    needs: [format]
    if: always() && needs.format.result != 'failure'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: windows-mount/go.mod
      - name: Run Go tests
        working-directory: windows-mount
        run: go test ./client/... ./proxyfs/... ./wdfs/... ./mountsvc/...

  security:
    runs-on: ubuntu-latest
    needs: [format]
    if: always() && needs.format.result != 'failure'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-go@v5
        with:
          go-version-file: windows-mount/go.mod
      - name: Install Bandit
        run: pip install bandit
      - name: Python security scan (Bandit)
        run: bandit -r fileproxy/ -x fileproxy/*/tests,fileproxy/*/migrations --severity-level medium -f txt
      - name: Install Node deps
        run: npm --prefix fileproxy install
      - name: TypeScript security scan (ESLint)
        run: npm --prefix fileproxy run lint:security
      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest
      - name: Go security scan (gosec)
        working-directory: windows-mount
        # G104: unhandled errors on Body.Close/srv.Close (idiomatic Go)
        # G112: Slowloris / missing ReadHeaderTimeout (localhost-only server, DoS excluded)
        # G117: secret field name in marshaled struct (API key saved intentionally to 0600 file)
        run: gosec -exclude=G104,G112,G117 ./client/... ./proxyfs/... ./wdfs/... ./mountsvc/... ./winmount/... ./cmd/...

  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      api: ${{ steps.filter.outputs.api }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'fileproxy/**/api/**'
              - 'fileproxy/**/models.py'
              - 'fileproxy/files/serializers.py'
              - 'fileproxy/api/urls.py'
              - 'fileproxy/config/urls.py'

  fuzz:
    runs-on: ubuntu-latest
    needs: [test, changes]
    if: always() && needs.test.result == 'success' && needs.changes.outputs.api == 'true'
    env:
      DJANGO_SUPERUSER_USERNAME: fuzzuser
      DJANGO_SUPERUSER_PASSWORD: fuzz-ci-password-123
      DJANGO_SUPERUSER_EMAIL: fuzz@ci.local
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        working-directory: fileproxy
        run: poetry install --no-root

      - name: Generate vault master key
        run: |
          echo "FILEPROXY_VAULT_MASTER_KEY=$(python3 -c \
            'import os,base64; print(base64.urlsafe_b64encode(os.urandom(32)).decode())')" \
            >> "$GITHUB_ENV"
          echo "DEBUG=true" >> "$GITHUB_ENV"

      - name: Apply migrations
        working-directory: fileproxy
        run: poetry run python manage.py migrate

      - name: Create superuser
        working-directory: fileproxy
        run: poetry run python manage.py createsuperuser --noinput

      - name: Start dev server
        working-directory: fileproxy
        run: |
          poetry run python manage.py runserver 127.0.0.1:8001 --noreload &
          echo $! > /tmp/django_server.pid

      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf -u "fuzzuser:fuzz-ci-password-123" \
                http://127.0.0.1:8001/api/schema/ -o /dev/null; then
              echo "Server is ready"
              exit 0
            fi
            echo "Waiting... attempt $i"
            sleep 1
          done
          echo "Server did not start in time"
          kill "$(cat /tmp/django_server.pid)" 2>/dev/null || true
          exit 1

      - name: Run Schemathesis
        working-directory: fileproxy
        run: |
          poetry run schemathesis run \
            http://127.0.0.1:8001/api/schema/ \
            --auth "fuzzuser:fuzz-ci-password-123" \
            --auth-type basic \
            --checks not_a_server_error,response_schema_conformance \
            --hypothesis-max-examples 30 \
            --hypothesis-seed 0 \
            --hypothesis-database none \
            --stateful links \
            --report /tmp/schemathesis-report.txt

      - name: Stop dev server
        if: always()
        run: kill "$(cat /tmp/django_server.pid)" 2>/dev/null || true

      - name: Upload fuzz report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: schemathesis-report
          path: /tmp/schemathesis-report.txt
          if-no-files-found: ignore
