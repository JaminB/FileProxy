name: CI

on:
  push:
    branches-ignore: [main]
  pull_request:

jobs:
  format:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: pip install ruff
      - run: npm --prefix fileproxy install
      - name: Format Python
        run: ruff format fileproxy/
      - name: Format TypeScript
        run: npm --prefix fileproxy run format
      - name: Commit formatting fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet || (git commit -am "style: auto-format [skip ci]" && git push)

  lint:
    runs-on: ubuntu-latest
    needs: [format]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install ruff
      - name: Lint (ruff check)
        run: ruff check fileproxy/
      - name: Format / isort (ruff format)
        run: ruff format --check fileproxy/

  test:
    runs-on: ubuntu-latest
    needs: [format]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install Poetry
        run: pip install poetry
      - name: Install dependencies
        working-directory: fileproxy
        run: poetry install --no-root
      - name: Generate test vault key
        run: |
          echo "FILEPROXY_VAULT_MASTER_KEY=$(python3 -c \
            'import os,base64; print(base64.urlsafe_b64encode(os.urandom(32)).decode())')" \
            >> "$GITHUB_ENV"
      - name: Run tests
        working-directory: fileproxy
        run: poetry run python manage.py test

  security:
    runs-on: ubuntu-latest
    needs: [format]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Bandit
        run: pip install bandit
      - name: Python security scan (Bandit)
        run: bandit -r fileproxy/ -x fileproxy/*/tests,fileproxy/*/migrations --severity-level medium -f txt
      - name: Install Node deps
        run: npm --prefix fileproxy install
      - name: TypeScript security scan (ESLint)
        run: npm --prefix fileproxy run lint:security

  fuzz:
    runs-on: ubuntu-latest
    needs: [test]
    env:
      DJANGO_SUPERUSER_USERNAME: fuzzuser
      DJANGO_SUPERUSER_PASSWORD: fuzz-ci-password-123
      DJANGO_SUPERUSER_EMAIL: fuzz@ci.local
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        working-directory: fileproxy
        run: poetry install --no-root

      - name: Generate vault master key
        run: |
          echo "FILEPROXY_VAULT_MASTER_KEY=$(python3 -c \
            'import os,base64; print(base64.urlsafe_b64encode(os.urandom(32)).decode())')" \
            >> "$GITHUB_ENV"

      - name: Apply migrations
        working-directory: fileproxy
        run: poetry run python manage.py migrate

      - name: Create superuser
        working-directory: fileproxy
        run: poetry run python manage.py createsuperuser --noinput

      - name: Start dev server
        working-directory: fileproxy
        run: |
          poetry run python manage.py runserver 127.0.0.1:8001 --noreload &
          echo $! > /tmp/django_server.pid

      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf -u "fuzzuser:fuzz-ci-password-123" \
                http://127.0.0.1:8001/api/schema/ -o /dev/null; then
              echo "Server is ready"
              exit 0
            fi
            echo "Waiting... attempt $i"
            sleep 1
          done
          echo "Server did not start in time"
          kill "$(cat /tmp/django_server.pid)" 2>/dev/null || true
          exit 1

      - name: Run Schemathesis
        working-directory: fileproxy
        run: |
          poetry run schemathesis run \
            http://127.0.0.1:8001/api/schema/ \
            --auth "fuzzuser:fuzz-ci-password-123" \
            --auth-type basic \
            --checks not_a_server_error,response_schema_conformance \
            --max-examples 30 \
            --hypothesis-seed 0 \
            --stateful links \
            --report /tmp/schemathesis-report.txt \
            --exitcode-on-empty-test-suite 0

      - name: Stop dev server
        if: always()
        run: kill "$(cat /tmp/django_server.pid)" 2>/dev/null || true

      - name: Upload fuzz report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: schemathesis-report
          path: /tmp/schemathesis-report.txt
          if-no-files-found: ignore
