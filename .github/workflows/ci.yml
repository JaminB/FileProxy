name: CI

on:
  push:
    branches-ignore: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install ruff
      - name: Lint (ruff check)
        run: ruff check fileproxy/
      - name: Format / isort (ruff format)
        run: ruff format --check fileproxy/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install Poetry
        run: pip install poetry
      - name: Install dependencies
        working-directory: fileproxy
        run: poetry install --no-root
      - name: Generate test vault key
        run: |
          echo "FILEPROXY_VAULT_MASTER_KEY=$(python3 -c \
            'import os,base64; print(base64.urlsafe_b64encode(os.urandom(32)).decode())')" \
            >> "$GITHUB_ENV"
      - name: Run tests
        working-directory: fileproxy
        run: poetry run python manage.py test
