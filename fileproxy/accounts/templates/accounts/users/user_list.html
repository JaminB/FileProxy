{% extends "base.html" %}
{% load static %}

{% block title %}Users — FileProxy{% endblock %}

{% block content %}
  <!-- Breadcrumb -->
  <nav aria-label="breadcrumb" class="mb-2">
    <ol class="breadcrumb mb-0">
      <li class="breadcrumb-item"><a href="/">Home</a></li>
      <li class="breadcrumb-item active" aria-current="page">Users</li>
    </ol>
  </nav>

  <!-- Header -->
  <div class="d-flex align-items-center justify-content-between mb-3">
    <div class="fw-semibold small">
      <i class="bi bi-people me-1 opacity-75"></i>Users
    </div>
  </div>

  <div id="flash" role="status" aria-live="polite" class="mb-3"></div>

  <!-- Filters row -->
  <div class="d-flex align-items-center gap-3 mb-3 flex-wrap">
    <!-- Status tabs -->
    <ul class="nav nav-pills nav-sm" id="status-tabs">
      <li class="nav-item">
        <button class="nav-link py-1 active" data-status="">All</button>
      </li>
      <li class="nav-item">
        <button class="nav-link py-1" data-status="pending">
          Pending <span class="badge bg-warning text-dark ms-1" id="badge-pending"></span>
        </button>
      </li>
      <li class="nav-item">
        <button class="nav-link py-1" data-status="active">Active</button>
      </li>
      <li class="nav-item">
        <button class="nav-link py-1" data-status="rejected">Rejected</button>
      </li>
      <li class="nav-item">
        <button class="nav-link py-1" data-status="suspended">Suspended</button>
      </li>
    </ul>

    <!-- Search -->
    <div class="ms-auto" style="min-width: 220px;">
      <input type="search" class="form-control form-control-sm" id="search-input" placeholder="Search username, email…">
    </div>
  </div>

  <!-- Users table -->
  <div class="card ab-card">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-sm table-hover align-middle mb-0">
          <thead>
            <tr>
              <th>Username</th>
              <th>Name</th>
              <th>Email</th>
              <th>Source</th>
              <th>Status</th>
              <th>Plan</th>
              <th>Joined</th>
              <th>Last Login</th>
              <th class="text-end">Actions</th>
            </tr>
          </thead>
          <tbody id="users-rows">
            <tr>
              <td colspan="9" class="text-secondary">Loading…</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Change Plan Modal -->
  <div class="modal fade" id="changePlanModal" tabindex="-1" aria-labelledby="changePlanModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-sm">
      <div class="modal-content">
        <div class="modal-header">
          <h6 class="modal-title" id="changePlanModalLabel">Change Plan</h6>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <select class="form-select form-select-sm" id="plan-select">
            {% for plan in plans %}
              <option value="{{ plan.id }}">{{ plan.name }}</option>
            {% empty %}
              <option disabled>No plans available</option>
            {% endfor %}
          </select>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-sm btn-primary" id="confirm-change-plan">Apply</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Reject/Suspend Note Modal -->
  <div class="modal fade" id="noteModal" tabindex="-1" aria-labelledby="noteModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-sm">
      <div class="modal-content">
        <div class="modal-header">
          <h6 class="modal-title" id="noteModalLabel">Add a note (optional)</h6>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <textarea class="form-control form-control-sm" id="note-input" rows="3" placeholder="Reason…"></textarea>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-sm btn-danger" id="confirm-note-action">Confirm</button>
        </div>
      </div>
    </div>
  </div>
{% endblock %}

{% block scripts %}
  <script type="module" src="{% static 'js/accounts/user_management.js' %}"></script>
{% endblock %}
