{% extends "base.html" %}
{% load static %}

{% block title %}Vault Metrics{% endblock %}

{% block content %}
  <nav aria-label="breadcrumb" class="mb-2">
    <ol class="breadcrumb mb-0">
      <li class="breadcrumb-item"><a href="/">Home</a></li>
      <li class="breadcrumb-item"><a href="/usage/">Usage</a></li>
      <li class="breadcrumb-item active" aria-current="page">Vault Metrics</li>
    </ol>
  </nav>

  <div class="d-flex align-items-center justify-content-between mb-3">
    <div class="fw-semibold small">
      <i class="bi bi-safe me-1 opacity-75"></i>Vault Metrics
    </div>
    <a href="/usage/" class="btn btn-sm btn-outline-secondary">Overview</a>
  </div>

  <div id="flash" role="status" aria-live="polite" class="mb-3"></div>

  <div class="row g-3 mb-4" id="kind-cards">
    <div class="col-12 text-secondary small">Loading…</div>
  </div>

  <div class="fw-semibold small mb-2">Recently added credentials</div>
  <div class="card ab-card">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-sm table-hover align-middle mb-0">
          <thead>
            <tr>
              <th>Name</th>
              <th>Kind</th>
              <th>Created</th>
            </tr>
          </thead>
          <tbody id="recent-rows">
            <tr><td colspan="3" class="text-secondary">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
{% endblock %}

{% block scripts %}
  <script type="module" src="{% static 'js/usage/vault.js' %}"></script>
{% endblock %}
