{% extends "base.html" %}
{% load static %}

{% block title %}{{ vault_name }} — Usage{% endblock %}

{% block content %}
  <nav aria-label="breadcrumb" class="mb-2">
    <ol class="breadcrumb mb-0">
      <li class="breadcrumb-item"><a href="/">Home</a></li>
      <li class="breadcrumb-item"><a href="/usage/">Usage</a></li>
      <li class="breadcrumb-item active" aria-current="page">{{ vault_name }}</li>
    </ol>
  </nav>

  <div class="d-flex align-items-center justify-content-between mb-3">
    <div class="fw-semibold small">
      <i class="bi bi-bar-chart me-1 opacity-75"></i>{{ vault_name }}
    </div>
    <div class="d-flex gap-2">
      <div id="period-selector" class="btn-group" role="group" aria-label="Time period"></div>
      <a href="/usage/" class="btn btn-sm btn-outline-secondary">Overview</a>
    </div>
  </div>

  <div id="flash" role="status" aria-live="polite" class="mb-3"></div>

  <div class="row g-3 mb-4" id="summary-cards">
    <div class="col-12 text-secondary small">Loading…</div>
  </div>

  <div class="fw-semibold small mb-2">Operations over time</div>
  <div class="card ab-card">
    <div class="card-body">
      <canvas id="timeline-chart" height="80"></canvas>
    </div>
  </div>

  <span id="vault-name-data" data-vault-name="{{ vault_name }}" hidden></span>
{% endblock %}

{% block scripts %}
  <script src="{% static 'vendor/chart.js/chart.umd.min.js' %}"></script>
  <script type="module" src="{% static 'js/usage/vault_detail.js' %}"></script>
{% endblock %}
