<!doctype html>
{% load static %}
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}FileProxy{% endblock %}</title>
    {% block head %}{% endblock %}
    <link rel="stylesheet" href="/static/css/base.css">
  </head>
  <body>
    <header>
      {% block header %}
      {% endblock %}
    </header>

    <main>
      {% if messages %}
        <ul>
          {% for message in messages %}
            <li>{{ message }}</li>
          {% endfor %}
        </ul>
      {% endif %}

      {% block content %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}
  </body>
</html>
