{% extends "base.html" %}
{% load static %}

{% block title %}Connections{% endblock %}

{% block content %}
  <!-- Breadcrumb -->
  <nav aria-label="breadcrumb" class="mb-2">
    <ol class="breadcrumb mb-0">
      <li class="breadcrumb-item"><a href="/">Home</a></li>
      <li class="breadcrumb-item active" aria-current="page">Connections</li>
    </ol>
  </nav>

  <!-- Header -->
  <div class="d-flex align-items-center justify-content-between mb-2">
    <div class="fw-semibold small">
      <i class="bi bi-shield-lock me-1 opacity-75"></i>Connections
    </div>
    <a href="/connections/new/" class="btn btn-sm btn-primary">New credentials</a>
  </div>

  <div id="flash" role="status" aria-live="polite" class="mb-3"></div>

  <!-- Table -->
  <div class="card ab-card files-card">
    <div class="card-body p-0">
    <div class="table-responsive">
      <table class="table table-sm table-hover align-middle mb-0">
        <thead>
          <tr>
            <th>Name</th>
            <th>Kind</th>
            <th>Updated</th>
            <th>Rotated</th>
            <th class="text-end">Actions</th>
          </tr>
        </thead>
        <tbody id="connection-rows">
          <tr>
            <td colspan="5" class="text-secondary">Loading…</td>
          </tr>
        </tbody>
      </table>
    </div>
    </div>
  </div>
{% endblock %}

{% block scripts %}
  <script type="module" src="{% static 'js/connections/tables/credentials.js' %}"></script>
{% endblock %}
