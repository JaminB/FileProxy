{% extends "base.html" %}
{% load static %}

{% block title %}Connection{% endblock %}

{% block content %}
  <!-- Breadcrumb -->
  <nav aria-label="breadcrumb" class="mb-3">
    <ol class="breadcrumb mb-0">
      <li class="breadcrumb-item"><a href="/">Home</a></li>
      <li class="breadcrumb-item"><a href="/connections/">Connections</a></li>
      <li class="breadcrumb-item active" aria-current="page">Item</li>
    </ol>
  </nav>

  <!-- Header -->
  <div class="d-flex align-items-center justify-content-between mb-2">
    <div class="fw-semibold small">
      <i class="bi bi-shield-lock me-1 opacity-75"></i>
      <span id="item-title">Connection</span>
    </div>
    <div class="d-flex gap-2">
      <button id="btn-test" class="btn btn-sm btn-outline-secondary" type="button">Test</button>
      <button id="btn-edit" class="btn btn-sm btn-primary" type="button">Edit</button>
      <button id="btn-delete" class="btn btn-sm btn-outline-danger" type="button">Delete</button>
    </div>
  </div>

  <div id="flash" role="status" aria-live="polite" class="mb-3"></div>

  <!-- Metadata -->
  <div class="card ab-card files-card mb-3">
    <div class="card-body">
      <dl class="row mb-0">
        <dt class="col-sm-3 text-secondary">Name</dt>
        <dd class="col-sm-9" id="meta-name"><span class="text-secondary">Loading…</span></dd>

        <dt class="col-sm-3 text-secondary">Kind</dt>
        <dd class="col-sm-9" id="meta-kind"><span class="text-secondary">Loading…</span></dd>

        <dt class="col-sm-3 text-secondary">Created</dt>
        <dd class="col-sm-9" id="meta-created"><span class="text-secondary">Loading…</span></dd>

        <dt class="col-sm-3 text-secondary">Updated</dt>
        <dd class="col-sm-9" id="meta-updated"><span class="text-secondary">Loading…</span></dd>

        <dt class="col-sm-3 text-secondary">Rotated</dt>
        <dd class="col-sm-9" id="meta-rotated"><span class="text-secondary">Loading…</span></dd>

        <dt class="col-sm-3 text-secondary">ID</dt>
        <dd class="col-sm-9"><code id="meta-id"></code></dd>
      </dl>
    </div>
  </div>

  <!-- Edit panel (inline rename) -->
  <div class="card ab-card files-card" id="edit-panel" style="display:none;">
    <div class="card-body">
      <div class="d-flex align-items-center justify-content-between mb-3">
        <h2 class="h5 mb-0">Edit</h2>
      </div>

      <div class="mb-3">
        <label class="form-label" for="edit-name">Name</label>
        <input class="form-control" id="edit-name" name="edit-name" type="text" />
      </div>

      <div class="d-flex justify-content-end gap-2">
        <button id="btn-cancel-edit" class="btn btn-sm btn-outline-secondary" type="button">Cancel</button>
        <button id="btn-save" class="btn btn-sm btn-primary" type="button">Save</button>
      </div>
    </div>
  </div>

  <script id="connection-id" type="application/json">"{{ item_id }}"</script>
{% endblock %}

{% block scripts %}
  <script type="module" src="{% static 'js/connections/item/detail.js' %}"></script>
{% endblock %}
